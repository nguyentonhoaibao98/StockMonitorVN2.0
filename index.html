<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Stock Monitor</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header>
      <h1>Stock Monitor</h1>
      <p class="subtitle">Current price and period changes (1D / 1W / 1M / 1Y)</p>
    </header>

    <main>
      <section class="controls">
        <label for="symbols">Symbols (comma separated):</label>
        <input id="symbols" placeholder="AAPL, MSFT, TSLA" value="AAPL,MSFT,TSLA">
        <button id="fetchBtn">Fetch</button>
        <span id="status" class="status"></span>
      </section>

      <section class="results">
        <table id="resultsTable">
          <thead>
            <tr>
              <th>Symbol</th>
              <th>Current</th>
              <th>1D</th>
              <th>1W</th>
              <th>1M</th>
              <th>1Y</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </main>

    <footer>
      <small>Data from Financial Modeling Prep. Replace API key in <code>app.js</code>.</small>
    </footer>

    <script src="app.js" type="module"></script>
  </body>
</html>
